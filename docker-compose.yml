services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bennu
      POSTGRES_PASSWORD: bennu
      POSTGRES_DB: bennu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bennu -d bennu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      FLASK_APP: wsgi:app
      DATABASE_URL: postgresql://bennu:bennu@postgres:5432/bennu
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - upload_data:/tmp/bennu/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000

  celery-worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      FLASK_APP: wsgi:app
      DATABASE_URL: postgresql://bennu:bennu@postgres:5432/bennu
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./backend:/app
      - upload_data:/tmp/bennu/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app:celery worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  upload_data:
